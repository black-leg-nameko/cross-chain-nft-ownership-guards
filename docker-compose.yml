services:
  experiments:
    build: .
    volumes:
      - ./results:/app/results
      - ./figures:/app/figures
      - ./reports:/app/reports
    command: node scripts/run_experiments.js
  foundry:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["forge"]
    working_dir: /app
    volumes:
      - .:/app
    command: ["test", "--gas-report"]
  chain-a:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command: ["--host", "0.0.0.0", "--chain-id", "31337", "--block-time", "1"]
    ports:
      - "8545:8545"
  chain-b:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command: ["--host", "0.0.0.0", "--chain-id", "31338", "--block-time", "1"]
    ports:
      - "8546:8545"
  multichain:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["/bin/sh"]
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      - chain-a
      - chain-b
    environment:
      RPC_A: "http://chain-a:8545"
      RPC_B: "http://chain-b:8545"
      CHAIN_A_ID: "31337"
      CHAIN_B_ID: "31338"
      RELAY_DELAY_SECONDS: "3"
    command: ["scripts/run_multichain_anvil.sh"]
